# Canonical Strategy Archetype Taxonomy
# 7 archetypes × 20 pairs × 4 timeframes = 560 cells

archetypes:
  TREND_MOMENTUM:
    correlation_group: "trend"
    description: "Ride directional moves with momentum confirmation"
    preferred_regimes: [EFFICIENT_TREND]
    anti_regimes: [CHAOS, COMPRESSION]
    preferred_pairs: [BTC, ETH, SOL, XRP, BNB, ADA, AVAX, LINK, TON, SUI]
    preferred_timeframes: [1h, 4h]
    risk_profile:
      max_drawdown: 0.15
      typical_win_rate: 0.40
      typical_rr_ratio: 2.5
      sizing_base: 1.0
    graduation_gates:
      min_trades_per_window: 15
      min_wf_sharpe: 0.5
      max_wf_degradation_pct: 30
      max_drawdown_pct: 15
    paper_validation:
      "5m":  { days: 2,  min_trades: 50, min_live_sharpe: 0.5 }
      "15m": { days: 3,  min_trades: 30, min_live_sharpe: 0.5 }
      "1h":  { days: 7,  min_trades: 15, min_live_sharpe: 0.5 }
      "4h":  { days: 14, min_trades: 10, min_live_sharpe: 0.5 }
      "1d":  { days: 30, min_trades: 5,  min_live_sharpe: 0.5 }
    strategy_tags: [trend_following, momentum, ema_crossover, adx_trend]

  MEAN_REVERSION:
    correlation_group: "range"
    description: "Fade extremes in ranging/quiet markets"
    preferred_regimes: [TRANQUIL, COMPRESSION]
    anti_regimes: [EFFICIENT_TREND, CHAOS]
    preferred_pairs: [BTC, ETH, SOL, XRP, BNB, DOGE, ADA, AVAX, LINK, TON, SUI, DOT, NEAR, UNI, LTC]
    preferred_timeframes: [15m, 1h]
    risk_profile:
      max_drawdown: 0.10
      typical_win_rate: 0.60
      typical_rr_ratio: 1.2
      sizing_base: 0.8
    graduation_gates:
      min_trades_per_window: 8
      min_wf_sharpe: 0.4
      max_wf_degradation_pct: 25
      max_drawdown_pct: 10
    paper_validation:
      "5m":  { days: 2,  min_trades: 40, min_live_sharpe: 0.5 }
      "15m": { days: 3,  min_trades: 20, min_live_sharpe: 0.5 }
      "1h":  { days: 7,  min_trades: 8,  min_live_sharpe: 0.5 }
      "4h":  { days: 14, min_trades: 5,  min_live_sharpe: 0.5 }
      "1d":  { days: 30, min_trades: 3,  min_live_sharpe: 0.5 }
    strategy_tags: [mean_reversion, rsi, bollinger, stochastic]

  BREAKOUT:
    correlation_group: "trend"
    description: "Catch regime transitions from compression to trend"
    preferred_regimes: [COMPRESSION]
    anti_regimes: [TRANQUIL, CHAOS]
    preferred_pairs: [BTC, ETH, SOL, XRP, BNB]
    preferred_timeframes: [1h, 4h]
    risk_profile:
      max_drawdown: 0.12
      typical_win_rate: 0.35
      typical_rr_ratio: 3.0
      sizing_base: 0.7
    graduation_gates:
      min_trades_per_window: 10
      min_wf_sharpe: 0.5
      max_wf_degradation_pct: 35
      max_drawdown_pct: 12
    paper_validation:
      "5m":  { days: 2,  min_trades: 40, min_live_sharpe: 0.5 }
      "15m": { days: 3,  min_trades: 25, min_live_sharpe: 0.5 }
      "1h":  { days: 7,  min_trades: 10, min_live_sharpe: 0.5 }
      "4h":  { days: 14, min_trades: 8,  min_live_sharpe: 0.5 }
      "1d":  { days: 30, min_trades: 4,  min_live_sharpe: 0.5 }
    strategy_tags: [breakout, donchian, range_breakout, volatility_expansion]

  RANGE_BOUND:
    correlation_group: "range"
    description: "Trade within established ranges with tight risk"
    preferred_regimes: [TRANQUIL]
    anti_regimes: [EFFICIENT_TREND, CHAOS]
    preferred_pairs: [BTC, ETH, SOL, XRP, BNB, DOGE, ADA, AVAX, LINK, TON, SUI, DOT, NEAR, UNI, LTC]
    preferred_timeframes: [15m, 1h]
    risk_profile:
      max_drawdown: 0.08
      typical_win_rate: 0.65
      typical_rr_ratio: 1.0
      sizing_base: 0.6
    graduation_gates:
      min_trades_per_window: 15
      min_wf_sharpe: 0.3
      max_wf_degradation_pct: 20
      max_drawdown_pct: 8
    paper_validation:
      "5m":  { days: 2,  min_trades: 50, min_live_sharpe: 0.5 }
      "15m": { days: 3,  min_trades: 30, min_live_sharpe: 0.5 }
      "1h":  { days: 7,  min_trades: 15, min_live_sharpe: 0.5 }
      "4h":  { days: 14, min_trades: 10, min_live_sharpe: 0.5 }
      "1d":  { days: 30, min_trades: 5,  min_live_sharpe: 0.5 }
    strategy_tags: [range, support_resistance, grid, ping_pong]

  SCALPING:
    correlation_group: "vol"
    description: "High-frequency small profits in liquid markets"
    preferred_regimes: [EFFICIENT_TREND, TRANQUIL]
    anti_regimes: [CHAOS]
    preferred_pairs: [BTC, ETH, SOL]
    preferred_timeframes: [5m, 15m]
    risk_profile:
      max_drawdown: 0.05
      typical_win_rate: 0.55
      typical_rr_ratio: 1.5
      sizing_base: 0.5
    graduation_gates:
      min_trades_per_window: 50
      min_wf_sharpe: 0.3
      max_wf_degradation_pct: 20
      max_drawdown_pct: 5
    paper_validation:
      "5m":  { days: 1,  min_trades: 100, min_live_sharpe: 0.5 }
      "15m": { days: 2,  min_trades: 50,  min_live_sharpe: 0.5 }
      "1h":  { days: 5,  min_trades: 30,  min_live_sharpe: 0.5 }
    strategy_tags: [scalping, micro_trend, tick, spread]

  CARRY_FUNDING:
    correlation_group: "carry"
    description: "Capture funding rate differentials in quiet markets"
    preferred_regimes: [TRANQUIL]
    anti_regimes: [CHAOS, EFFICIENT_TREND]
    preferred_pairs: [BTC, ETH, SOL, XRP, BNB, DOGE, ADA, AVAX, LINK, TON, SUI, DOT, NEAR, UNI, LTC]
    preferred_timeframes: [4h, 1d]
    risk_profile:
      max_drawdown: 0.06
      typical_win_rate: 0.70
      typical_rr_ratio: 0.8
      sizing_base: 0.4
    graduation_gates:
      min_trades_per_window: 5
      min_wf_sharpe: 0.3
      max_wf_degradation_pct: 15
      max_drawdown_pct: 6
    paper_validation:
      "1h":  { days: 14, min_trades: 5,  min_live_sharpe: 0.5 }
      "4h":  { days: 21, min_trades: 5,  min_live_sharpe: 0.5 }
      "1d":  { days: 30, min_trades: 3,  min_live_sharpe: 0.5 }
    strategy_tags: [carry, funding_rate, basis_trade, cash_and_carry]

  VOLATILITY_HARVEST:
    correlation_group: "vol"
    description: "Profit from volatility expansion in chaotic/compressed markets"
    preferred_regimes: [CHAOS, COMPRESSION]
    anti_regimes: [TRANQUIL]
    preferred_pairs: [BTC, ETH, SOL, XRP, BNB]
    preferred_timeframes: [1h, 4h]
    risk_profile:
      max_drawdown: 0.20
      typical_win_rate: 0.35
      typical_rr_ratio: 3.5
      sizing_base: 0.5
    graduation_gates:
      min_trades_per_window: 8
      min_wf_sharpe: 0.6
      max_wf_degradation_pct: 40
      max_drawdown_pct: 20
    paper_validation:
      "15m": { days: 3,  min_trades: 15, min_live_sharpe: 0.5 }
      "1h":  { days: 7,  min_trades: 8,  min_live_sharpe: 0.5 }
      "4h":  { days: 14, min_trades: 5,  min_live_sharpe: 0.5 }
    strategy_tags: [volatility, straddle, gamma, supertrend, atr_expansion]

# Cell grid dimensions
# Tier 1 (highest liquidity): BTC, ETH, SOL, XRP, BNB
# Tier 2 (good liquidity):    DOGE, ADA, AVAX, LINK, TON
# Tier 3 (moderate):          SUI, DOT, SHIB, NEAR, UNI
# Tier 4 (adequate):          LTC, BCH, APT, ARB, OP
pairs:
  - BTC
  - ETH
  - SOL
  - XRP
  - BNB
  - DOGE
  - ADA
  - AVAX
  - LINK
  - TON
  - SUI
  - DOT
  - SHIB
  - NEAR
  - UNI
  - LTC
  - BCH
  - APT
  - ARB
  - OP

timeframes:
  - 5m
  - 15m
  - 1h
  - 4h

# Total cells: 7 archetypes × 20 pairs × 4 timeframes = 560

# Scoring rubric
scoring:
  regime_fit:
    description: "Does the current regime match this archetype's preferred regimes?"
    scale: 0-6
    rules:
      - "6: Current regime is in preferred_regimes AND conviction >= 80"
      - "5: Current regime is in preferred_regimes AND conviction >= 60"
      - "4: Current regime is in preferred_regimes AND conviction < 60"
      - "3: Current regime is neutral (not preferred, not anti)"
      - "2: Current regime is in anti_regimes BUT conviction < 40"
      - "1: Current regime is in anti_regimes AND conviction >= 40"
      - "0: Current regime is in anti_regimes AND conviction >= 60"

  execution_fit:
    description: "Is the market microstructure suitable for clean execution?"
    scale: 0-6
    rules:
      - "6: Book balanced, whale flow aligned with direction, aggressor ratio confirms"
      - "5: Two of three microstructure signals aligned"
      - "4: One strong microstructure signal, others neutral"
      - "3: All microstructure signals neutral"
      - "2: One negative microstructure signal"
      - "1: Two negative signals (e.g., whale selling + ask-heavy book)"
      - "0: All three negative — adverse microstructure"

  net_edge:
    description: "Historical backtest performance for best strategy at this cell"
    scale: 0-6
    rules:
      - "6: WF Sharpe >= 1.5 AND max DD < 10% AND trades >= 30"
      - "5: WF Sharpe >= 1.0 AND max DD < 15%"
      - "4: WF Sharpe >= 0.5 AND max DD < 20%"
      - "3: WF Sharpe >= 0.0 (breakeven)"
      - "2: WF Sharpe < 0.0 but > -0.5 (mild negative)"
      - "1: WF Sharpe < -0.5 (clearly negative)"
      - "0: No backtest data OR WF Sharpe < -1.0"

  composite:
    description: "Weighted blend of three subscores"
    formula: "composite = (regime_fit × 0.4) + (execution_fit × 0.25) + (net_edge × 0.35)"
    deploy_threshold: 3.5
    undeploy_threshold: 2.0

# Portfolio constraints (scaled for 20-pair grid)
portfolio:
  max_deployments_per_archetype: 5
  max_deployments_per_pair: 3
  max_total_deployments: 20
  max_capital_pct_per_deployment: 0.10
  max_capital_pct_per_archetype: 0.25
  max_capital_pct_per_pair: 0.15
  portfolio_dd_circuit_breaker: 0.15
